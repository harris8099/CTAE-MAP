<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
  <style>
    :root {
      color-scheme: light;
      --panel-width: 360px;
      --panel-bg: #e7efee;
      --panel-border: #a5b4b2;
      --panel-accent: #4c8b86;
      --panel-accent-soft: #d3ebe9;
      --text-primary: #1e3534;
      --text-secondary: #4a6766;
      --app-bg: #eef3f2;
      --nav-bg: #8fa9a4;
      --surface-bg: #f3f7f6;
      --card-bg: #ffffff;
    }

    body.theme-dark {
      color-scheme: dark;
      --panel-bg: #172022;
      --panel-border: #2f4442;
      --panel-accent: #84c8c2;
      --panel-accent-soft: #213435;
      --text-primary: #e7f1ef;
      --text-secondary: #b3c5c2;
      --app-bg: #0f1516;
      --nav-bg: #1e2b2d;
      --surface-bg: #203032;
      --card-bg: #1a2628;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--app-bg);
      color: var(--text-primary);
    }

    .nav-bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 66px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 0 18px;
      background: var(--nav-bg);
      color: var(--text-primary);
      z-index: 1000;
      border-bottom: 1px solid rgba(0, 0, 0, 0.12);
    }

    .nav-brand {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .nav-brand .logo {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      background: url('ctaelogo.png') center/cover no-repeat;
      background-color: #d6e0da;
    }

    .nav-search {
      flex: 1;
      max-width: 560px;
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--surface-bg);
      border-radius: 30px;
      padding: 8px 12px;
      border: 1px solid rgba(0, 0, 0, 0.12);
    }

    .nav-search input {
      flex: 1;
      border: none;
      outline: none;
      background: transparent;
      font-size: 1rem;
      color: var(--text-primary);
      padding: 6px 4px;
    }

    .nav-search button {
      border: none;
      background: transparent;
      cursor: pointer;
      color: var(--text-primary);
      font-size: 1.1rem;
    }

    .nav-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .nav-actions button {
      border: none;
      background: transparent;
      color: var(--text-primary);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.9rem;
    }

    .side-panel {
      position: fixed;
      top: 66px;
      left: 0;
      bottom: 0;
      width: var(--panel-width);
      padding: 14px;
      overflow-y: auto;
      background: var(--panel-bg);
      border-right: 1px solid rgba(0, 0, 0, 0.08);
      z-index: 10;
      transition: transform 0.28s ease;
    }

    .side-panel.collapsed {
      transform: translateX(-100%);
    }

    #map {
      position: fixed;
      top: 66px;
      left: var(--panel-width);
      right: 0;
      bottom: 0;
      z-index: 1;
    }

    .side-panel.collapsed ~ #map {
      left: 0;
    }

    .panel-section {
      margin-bottom: 18px;
    }

    .panel-section h2 {
      margin: 0 0 8px;
      font-size: 1rem;
      letter-spacing: 0.02em;
      color: var(--panel-accent);
      text-transform: uppercase;
    }

    .search-feedback {
      margin-top: 4px;
      font-size: 0.92rem;
      color: var(--text-secondary);
      line-height: 1.4;
    }

    .location-list {
      display: grid;
      gap: 8px;
      margin-top: 12px;
      max-height: 211px;
      overflow-y: auto;
      padding-right: 4px;
    }

    .location-item {
      width: 100%;
      border: 1px solid rgba(76, 139, 134, 0.35);
      border-radius: 10px;
      padding: 10px 12px;
      background: var(--card-bg);
      color: var(--text-primary);
      text-align: left;
      cursor: pointer;
      transition: transform 0.2s ease, background 0.2s ease;
    }

    .location-item:hover,
    .location-item.active {
      background: var(--panel-accent-soft);
      transform: translateX(1px);
      border-color: var(--panel-accent);
    }

    .panel-image {
      width: 100%;
      min-height: 170px;
      border-radius: 14px;
      background: #d7e5e2;
      background-size: cover;
      background-position: center;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #536464;
      font-size: 0.95rem;
      text-align: center;
      padding: 16px;
    }

    .tabs {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 12px;
    }

    .tab-button {
      border: 1px solid rgba(0, 0, 0, 0.12);
      border-radius: 12px;
      background: var(--card-bg);
      padding: 10px 8px;
      font-size: 0.92rem;
      cursor: pointer;
      transition: background 0.2s ease, border-color 0.2s ease;
      color: var(--text-primary);
    }

    .tab-button.active {
      background: var(--panel-accent-soft);
      border-color: var(--panel-accent);
    }

    .content-card {
      background: var(--card-bg);
      border: 1px solid rgba(0, 0, 0, 0.1);
      border-radius: 14px;
      padding: 16px;
      box-shadow: 0 6px 16px rgba(20, 33, 33, 0.04);
    }

    body.theme-dark .nav-search,
    body.theme-dark .location-item,
    body.theme-dark .tab-button,
    body.theme-dark .content-card {
      border-color: rgba(133, 169, 166, 0.35);
    }

    body.theme-dark .leaflet-bar a,
    body.theme-dark .leaflet-control-layers-toggle {
      background-color: #1b2729;
      color: #e7f1ef;
      border-color: #2f4442;
    }

    body.theme-dark .leaflet-control-layers {
      background: #1b2729;
      color: #e7f1ef;
      border-color: #2f4442;
    }

    body.theme-dark .leaflet-control-attribution {
      background: rgba(20, 27, 28, 0.78);
      color: #c6d8d5;
    }

    body.theme-dark .leaflet-control-attribution a {
      color: #9dd4ce;
    }

    .content-card h3 {
      margin-top: 0;
      font-size: 1rem;
      color: var(--panel-accent);
    }

    .content-card p,
    .content-card ul {
      margin: 0;
      color: var(--text-secondary);
      line-height: 1.5;
    }

    .content-card ul {
      margin-top: 8px;
      padding-left: 18px;
    }

    .content-card li {
      margin-bottom: 6px;
    }

    .hidden {
      display: none !important;
    }

    .side-panel .placeholder {
      background: #f7faf8;
      border: 1px dashed rgba(76, 139, 134, 0.5);
      border-radius: 12px;
      padding: 16px;
      color: var(--text-secondary);
    }

    .contact-link {
      color: var(--panel-accent);
      text-decoration: none;
    }

    /* ========== RESPONSIVE STYLES ========== */
    
    /* Tablet landscape */
    @media screen and (max-width: 1024px) {
      :root {
        --panel-width: 300px;
      }
    }

    /* Tablet portrait */
    @media screen and (max-width: 768px) {
      :root {
        --panel-width: 260px;
      }
      
      .nav-brand span {
        display: none;
      }
      
      .nav-search {
        max-width: 280px;
      }
      
      .nav-actions button span {
        display: none;
      }
    }

    /* Mobile landscape and small tablets */
    @media screen and (max-width: 640px) {
      :root {
        --panel-width: 100%;
      }
      
      .nav-bar {
        height: 56px;
        padding: 0 12px;
        gap: 8px;
      }
      
      .nav-brand .logo {
        width: 40px;
        height: 40px;
      }
      
      .nav-search {
        max-width: none;
        flex: 1;
        padding: 6px 10px;
      }
      
      .nav-search input {
        font-size: 0.9rem;
      }
      
      .side-panel {
        position: fixed;
        width: 100%;
        top: 56px;
        bottom: 0;
        left: 0;
        right: 0;
        border-right: none;
        border-bottom: none;
        background: var(--panel-bg);
        z-index: 1200;
        transform: translateX(-100%);
        transition: transform 0.28s ease;
      }
      
      #map {
        top: 56px;
        left: 0;
        right: 0;
        bottom: 0;
        width: 100%;
        height: calc(100vh - 56px);
      }
      
      .location-list {
        max-height: 120px;
      }
      
      .panel-image {
        min-height: 120px;
      }
    }

    /* Small mobile devices */
    @media screen and (max-width: 400px) {
      .nav-bar {
        padding: 0 8px;
      }
      
      .nav-brand .logo {
        width: 36px;
        height: 36px;
      }
      
      .nav-search {
        padding: 5px 8px;
      }
      
      .nav-search input {
        font-size: 0.85rem;
      }
      
      .side-panel {
        padding: 10px;
      }
      
      .panel-section h2 {
        font-size: 0.9rem;
      }
      
      .tab-button {
        padding: 8px 6px;
        font-size: 0.85rem;
      }
    }

    /* Landscape mobile */
    @media screen and (max-height: 500px) and (max-width: 768px) {
      #map {
        height: calc(100vh - 56px);
      }
    }

    /* Touch devices - larger tap targets */
    @media (hover: none) and (pointer: coarse) {
      .location-item {
        padding: 12px 14px;
      }
      
      .nav-actions button {
        padding: 10px;
      }
    }

    /* High DPI displays */
    @media (-webkit-min-device-pixel-ratio: 2), (min-resolution: 192dpi) {
      .nav-brand .logo {
        background-image: url(ctaelogo.png);
      }
    }

    /* Print styles */
    @media print {
      .nav-bar, .side-panel {
        display: none;
      }
      
      #map {
        position: relative;
        top: 0;
        left: 0;
        height: 100vh;
      }
    }

    /* Mobile panel toggle button */
    .panel-toggle-btn {
      display: flex;
      background: transparent;
      border: none;
      color: var(--text-primary);
      cursor: pointer;
      font-size: 1.2rem;
      padding: 8px;
    }

    @media screen and (max-width: 640px) {
      .panel-toggle-btn {
        display: flex;
        align-items: center;
        justify-content: center;
      }
      
      .side-panel.collapsed {
        transform: translateX(-100%);
      }

      .side-panel:not(.collapsed) {
        transform: translateX(0);
      }
    }
  </style>
</head>
<body>

    <div class="nav-brand">

    </div>

      <datalist id="search-suggestions"></datalist>
      <button id="search-btn" title="Search"><i class="fa-solid fa-magnifying-glass"></i></button>
    </div>

    <div class="nav-actions">
      <button type="button" id="panel-toggle-mobile" class="panel-toggle-btn" title="Toggle panel">
        <i class="fa-solid fa-bars"></i>
        <span>Menu</span>
      </button>

      <div id="floor-content" class="content-card hidden">

        <div id="f-detail"></div>

        <h3>Contact</h3>
        <div id="contact-info">

        </div>
      </div>
    </section>
  </aside>

      { "type": "FeatureCollection", "features": [{ "type": "Feature", "geometry": { "type": "Polygon", "coordinates": [[[73.73934179, 24.59032154], [73.73934476, 24.59023418], [73.73960511, 24.59022302], [73.73961044, 24.59008057], [73.739512, 24.59006212], [73.73928426, 24.59006164], [73.73928308, 24.58999369], [73.7394266, 24.58999126], [73.73942838, 24.58985658], [73.73951556, 24.58985537], [73.73952742, 24.58999078], [73.73966263, 24.58997379], [73.73967449, 24.59006091], [73.73969762, 24.59022204], [73.73969229, 24.5903196], [73.73934179, 24.59032154]]] }, "id": "147d404a-42fa-4156-b083-c8d3c68c37f6", "properties": { "name": "Homi J Bhabha Phd. Hostel" } }] },

      { "type": "FeatureCollection", "features": [{ "type": "Feature", "geometry": { "type": "Polygon", "coordinates": [[[73.7380429, 24.59888574], [73.73807996, 24.59875981], [73.73825162, 24.59880149], [73.73823407, 24.59885115], [73.73827991, 24.59886445], [73.73825357, 24.59894338], [73.7380429, 24.59888574]]] }, "id": "72d70ab0-3a29-4049-8190-271a8d46f236", "properties": { "name": "Unknown Building" } }, { "type": "Feature", "geometry": { "type": "Polygon", "coordinates": [[[73.73723314, 24.599355], [73.73709829, 24.59929369], [73.73701814, 24.59919349], [73.73696214, 24.59911516], [73.73692911, 24.59901071], [73.73691906, 24.59891801], [73.73697018, 24.59870514], [73.73716234, 24.59804303], [73.73726011, 24.59794494], [73.73734102, 24.59789283], [73.73751633, 24.59785604], [73.73764444, 24.59786217], [73.73777929, 24.59790509], [73.73788717, 24.59798172], [73.73798157, 24.59808288], [73.73801528, 24.59823002], [73.73800854, 24.59836796], [73.73796471, 24.59862545], [73.73789391, 24.59887374], [73.73781975, 24.59909751], [73.73769164, 24.59926917], [73.73753993, 24.59935806], [73.73738485, 24.59937952], [73.73723314, 24.599355]]] }, "id": "9a03bf4c-cba1-4933-b602-5712de8de296", "properties": { "name": "CTAE Ground", "imageUrl": "assets\\ground.jpg" } }] }
    ];

    const allLocations = [
      ...Department_array,
      ...jsonArray.flatMap((collection) => collection.features.map((feature) => {
        const name = String(feature.properties?.name || '').trim();
        if (!name) return null;
        const existing = Department_array.find((dept) => dept.name.trim().toLowerCase() === name.toLowerCase());
        if (existing) return null;
        return {
          id: String(feature.properties?.id ?? name),
          name,
          detail: `Information for ${name} is not available yet.`,
          floor: [],
          contact: { Dean: 'Not available' },
          imageUrl: feature.properties?.imageUrl ? feature.properties.imageUrl.replace(/\\/g, '/') : null
        };
      })).filter(Boolean)
    ];

    const geoJSONStyle = {
      color: '#67b39d',
      weight: 2,
      fillOpacity: 0.18,
      fillColor: '#88d0c4'
    };

    const geoJSONLayer = L.geoJSON(jsonArray, {
      style: geoJSONStyle,
      onEachFeature: (feature, layer) => {
        layer.bindTooltip(feature.properties.name || 'Building', {
          sticky: true,
          direction: 'top',
          offset: [0, -6]
        });

        layer.on('mouseover', () => {
          layer.setStyle({ color: '#2f8d7c', fillOpacity: 0.5 });
          layer.openTooltip();
        });

        layer.on('mouseout', () => {
          layer.setStyle(geoJSONStyle);
          layer.closeTooltip();
        });

        layer.on('click', () => {
          const resolvedId = String(feature.properties._resolvedId || '').trim();
          const clickId = String(feature.properties.id || '').trim();
          detailPane(resolvedId || clickId || feature.properties.name);
        });
      }
    }).addTo(map);

    layerControl = L.control.layers(baseLayers, { 'Campus Boundaries': geoJSONLayer }).addTo(map);

    function applyTheme(isDarkMode) {
      document.body.classList.toggle('theme-dark', isDarkMode);

      if (currentBaseLayer) {
        map.removeLayer(currentBaseLayer);
      }

      currentBaseLayer = isDarkMode ? darkLayer : lightLayer;
      currentBaseLayer.addTo(map);

      if (themeIcon && themeLabel) {
        themeIcon.className = isDarkMode ? 'fa-solid fa-sun' : 'fa-solid fa-moon';
        themeLabel.textContent = isDarkMode ? 'Light' : 'Dark';
      }
    }

    map.on('baselayerchange', (event) => {
      currentBaseLayer = event.layer;
      const selectedDark = event.name === 'Dark';
      document.body.classList.toggle('theme-dark', selectedDark);
      if (themeIcon && themeLabel) {
        themeIcon.className = selectedDark ? 'fa-solid fa-sun' : 'fa-solid fa-moon';
        themeLabel.textContent = selectedDark ? 'Light' : 'Dark';
      }
    });

    function buildFeatureLayerMap() {
      geoJSONLayer.eachLayer((layer) => {
        const feature = layer.feature;
        if (!feature || !feature.properties) return;
        const featureName = String(feature.properties.name || '').trim().toLowerCase();
        const featureId = feature.properties.id !== undefined && feature.properties.id !== null ? String(feature.properties.id) : null;

        const locationByName = allLocations.find((loc) => String(loc.name).trim().toLowerCase() === featureName);
        const locationById = featureId ? allLocations.find((loc) => String(loc.id) === featureId) : null;
        const location = locationByName || locationById;

        if (location) {
          featureLayerMap[String(location.id)] = layer;
          feature.properties._resolvedId = String(location.id);
          if (!featureId) {
            feature.properties.id = String(location.id);
          }
        }
      });
    }

    function getMatchingLocations(query) {
      const normalized = String(query || '').trim().toLowerCase();
      if (!normalized) return allLocations;
      return allLocations.filter((location) => location.name.toLowerCase().includes(normalized));
    }

    function updateSearchSuggestions(items = allLocations) {
      searchSuggestions.innerHTML = '';
      items.slice(0, 10).forEach((location) => {
        const option = document.createElement('option');
        option.value = location.name;
        searchSuggestions.appendChild(option);
      });
    }

    function renderLocationList(items = allLocations) {
      locationList.innerHTML = '';
      if (!items.length) {
        const message = document.createElement('div');
        message.className = 'location-item';
        message.textContent = 'No matching locations found.';
        locationList.appendChild(message);
        return;
      }
      items.forEach((location) => {
        const item = document.createElement('button');
        item.type = 'button';
        item.className = 'location-item';
        item.dataset.locationId = String(location.id);
        item.textContent = location.name;
        item.addEventListener('click', () => selectDepartment(location));
        locationList.appendChild(item);
      });
    }

    function updateSearchFeedback(message) {
      searchFeedback.textContent = message;
    }

    function setActiveTab(tabName) {
      overviewTab.classList.toggle('active', tabName === 'overview');
      floorTab.classList.toggle('active', tabName === 'floor');
      contactTab.classList.toggle('active', tabName === 'contact');
      overviewContent.classList.toggle('hidden', tabName !== 'overview');
      floorContent.classList.toggle('hidden', tabName !== 'floor');
      contactContent.classList.toggle('hidden', tabName !== 'contact');
    }

    function updateOverview(department) {
      buildingName.textContent = department.name;
      buildingDetail.textContent = department.detail;
      buildingFloorCount.textContent = `Floors: ${department.floor.length}`;
      if (department.imageUrl) {
        imageBox.style.backgroundImage = `url(${department.imageUrl})`;
        imageBox.textContent = '';
      } else {
        imageBox.style.backgroundImage = 'none';
        imageBox.textContent = 'Image not available';
      }
    }

    function updateFloorOptions(department) {
      floorSelect.innerHTML = '';
      if (!department.floor.length) {
        floorSelect.disabled = true;
        floorDetail.innerHTML = '<p>No floor information available for this location.</p>';
        return;
      }
      department.floor.forEach((floorData, index) => {
        const option = document.createElement('option');
        option.value = index;
        option.textContent = departmentFloors[index] || `Floor ${index + 1}`;
        floorSelect.appendChild(option);
      });
      floorSelect.disabled = false;
      renderFloorDetails(department, 0);
    }

    function renderFloorDetails(department, index) {
      const floorIndex = Number(index);
      const floorData = department.floor[floorIndex] || [];
      const floorLabel = departmentFloors[floorIndex] || `Floor ${floorIndex + 1}`;
      const list = floorData.length ? floorData : ['No locations listed for this floor.'];
      floorDetail.innerHTML = `
        <h3>${floorLabel}</h3>
        <ul>${list.map((item) => `<li>${item}</li>`).join('')}</ul>`;
    }

    function renderContact(department) {
      contactInfo.innerHTML = `
        <p><strong>Building:</strong> ${department.name}</p>
        <p><strong>Phone:</strong> ${department.contact?.Dean || 'Not available'}</p>
        <p><strong>Website:</strong> <a class="contact-link" href="https://ctae.ac.in/index.php" target="_blank">ctae.ac.in</a></p>`;
    }

    function highlightSelectedLocation(selectedId) {
      document.querySelectorAll('.location-item').forEach((item) => {
        item.classList.toggle('active', item.dataset.locationId === String(selectedId));
      });
    }

    function selectDepartment(department) {
      if (sidePanel.classList.contains('collapsed')) {
        sidePanel.classList.remove('collapsed');
      }

      currentDepartment = department;
      updateOverview(department);
      updateFloorOptions(department);
      renderContact(department);
      setActiveTab('overview');
      highlightSelectedLocation(department.id);

      const layer = featureLayerMap[String(department.id)];
      if (layer) {
        map.fitBounds(layer.getBounds().pad(0.25));
      }
      updateSearchFeedback(`Showing details for ${department.name}.`);
    }

    function detailPane(idOrName) {
      const searchTerm = String(idOrName || '').trim();
      const department = allLocations.find((dept) => {
        return String(dept.id) === searchTerm || dept.name.trim().toLowerCase() === searchTerm.toLowerCase();
      });
      if (!department) {
        updateSearchFeedback('No details available for this location.');
        return;
      }
      selectDepartment(department);
    }

    function searchBox() {
      const query = searchInput.value.trim();
      const matches = getMatchingLocations(query);
      renderLocationList(matches);
      updateSearchSuggestions(matches.length ? matches : allLocations);
      if (!query) {
        updateSearchFeedback('Showing all locations. Type to narrow results.');
        return;
      }
      if (!matches.length) {
        updateSearchFeedback('No matching locations found.');
        return;
      }
      updateSearchFeedback(`Found ${matches.length} match${matches.length === 1 ? '' : 'es'}.`);
      if (matches.length === 1) {
        selectDepartment(matches[0]);
      }
    }

    function resetToHomeState() {
      currentDepartment = null;
      searchInput.value = '';
      setActiveTab('overview');
      renderLocationList(allLocations);
      updateSearchSuggestions(allLocations);
      highlightSelectedLocation('');

      buildingName.textContent = 'Building name';
      buildingDetail.textContent = 'Select a location from the list or search to see building details here.';
      buildingFloorCount.textContent = '';

      imageBox.style.backgroundImage = 'none';
      imageBox.textContent = 'Select a location to view details.';

      floorSelect.innerHTML = '';
      floorSelect.disabled = true;
      floorDetail.innerHTML = '<p>Select a building to view floor details.</p>';

      contactInfo.innerHTML = '<p>Select a building to show contact details.</p>';
      updateSearchFeedback('Search or choose a location from the list.');

      const panel = document.querySelector('.side-panel');
      if (panel) {
        panel.classList.add('collapsed');
      }

      map.setView(DEFAULT_CENTER, DEFAULT_ZOOM);
      setTimeout(() => map.invalidateSize(), 250);
    }

    searchBtn.addEventListener('click', searchBox);
    searchInput.addEventListener('input', searchBox);
    searchInput.addEventListener('keydown', (event) => {
      if (event.key === 'Enter') searchBox();
    });
    overviewTab.addEventListener('click', () => setActiveTab('overview'));
    floorTab.addEventListener('click', () => setActiveTab('floor'));
    contactTab.addEventListener('click', () => setActiveTab('contact'));
    floorSelect.addEventListener('change', () => {
      if (currentDepartment) renderFloorDetails(currentDepartment, floorSelect.value);
    });
    homeViewBtn.addEventListener('click', () => {
      resetToHomeState();
    });
    themeToggleBtn.addEventListener('click', () => {
      const darkModeActive = document.body.classList.contains('theme-dark');
      applyTheme(!darkModeActive);
    });

    // ========== Responsive Features ==========
    
    // Handle map resize on window resize
    let resizeTimer;
    window.addEventListener('resize', () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(() => {
        map.invalidateSize();
      }, 100);
    });

    // Mobile panel toggle
    const panelToggleBtn = document.getElementById('panel-toggle-mobile');
    const sidePanel = document.querySelector('.side-panel');
    
    if (panelToggleBtn && sidePanel) {
      panelToggleBtn.addEventListener('click', () => {
        sidePanel.classList.toggle('collapsed');
        // Update map size after panel toggle
        setTimeout(() => {
          map.invalidateSize();
        }, 350);
      });
    }

    // Keep panel behavior device-aware while preserving manual toggle.
    function checkMobile() {
      const isMobile = window.innerWidth <= 640;
      if (panelToggleBtn) {
        if (isMobile) {
          sidePanel.classList.add('collapsed');
        }
      }
    }
    
    // Initial check
    sidePanel.classList.add('collapsed');
    checkMobile();
    applyTheme(true);
    // Check on resize
    window.addEventListener('resize', checkMobile);

    buildFeatureLayerMap();
    renderLocationList();
    updateSearchSuggestions(allLocations);
    updateSearchFeedback('Search or choose a location from the list.');
  </script>
